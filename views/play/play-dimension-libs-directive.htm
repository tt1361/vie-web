<div class="push-model-dialog play-other">
    <i class="push-model-play-up play-other"></i>
    <div class="push-model-header">
        <span>自定义维度</span>
    </div>
    <div class="push-model-search-wrap">
        <div class="all-choose-btn">
            <button ng-click="toggleAllChecked()">
                全&nbsp;选
            </button>
        </div>
        <div class="push-model-search">
            <input type="text" placeholder="请输入搜索内容" maxlength="20" ng-model="keyword" ng-keydown="enterKey($event)">
            <input type="button" class="icon icon-search" ng-click="searchDim()">
        </div>
    </div>
    <div class="push-model-content play-other">
        <div class="content-wrap">
            <dl>
                <dd class="common-overflow" ng-repeat="dimension in dimensions" on-finish-render="" broadcasteventname="colResizable">
                    <input type="checkbox" title="{{dimension.dimensionName}}" ng-checked="dimension.checked" ng-model="dimension.checked" ng-disabled="{{dimension.isSelect}}">
                    <span title="{{dimension.dimensionName}}" id="{{dimension.dimensionId}}">{{dimension.dimensionName | subData: 6}}</span>
                </dd>
            </dl>
        </div>
        <div class="push-model-btn">
            <button ng-click="pushedDimension()">
                保&nbsp;存
            </button>
        </div>
    </div>
</div>
