<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>播放器</title>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta http-equiv="Expires" CONTENT="0">
    <meta http-equiv="Cache-Control" CONTENT="no-cache">
    <meta http-equiv="Pragma" CONTENT="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="framework/ng-dialog/css/ngDialog-custom-width.css">
    <link rel="stylesheet" href="framework/ng-dialog/css/ngDialog-theme-default.css">
    <link rel="stylesheet" href="framework/ng-dialog/css/ngDialog-theme-default.min.css">
    <link rel="stylesheet" href="framework/ng-dialog/css/ngDialog.css">
    <link rel="stylesheet" href="framework/ng-dialog/css/ngDialog.min.css">
    <link rel="stylesheet" href="play/play.css">
    <link rel="stylesheet" href="app.css">
</head>
<body ng-app="playtext" ng-controller="playtextCtrl">
    <div class="play-new-wrapper">
        <div class="jianbian_se" style="margin: 5px auto 0px;width: 98%;border-radius: 4px;font-size: 12px;font-weight: bold;line-height: 30px;overflow: hidden;">
            <span style="margin-left: 12px;">工单详情</span>
            <!-- 维度选择齿轮 -->
            <i title="维度项选择" class="picture picture-set" ng-click="setDimension();" style="float: right; margin-right: 20px; margin-top: 5px;"></i>
            <div style="margin-left: 12px; padding-left: 24px; padding-top: 0px; height: 100%;" class="play-detail-content">
                <!-- <div style="border: none; background-color: #bfbfbf; width: 20%; height:30px; margin-left: 10px; margin-bottom: 10px; border-radius: 4px;"></div> -->
                <ul>
                    <li ng-repeat="name in rowsName">
                        <span ng-repeat="item in voiceList" title="{{name.column | celDataPlay : item}}" class="calldetailNum"> {{name.columnName}}：{{name.column | celDataPlay : item}} </span>
                    </li>
                    <li>
                        <span class="calldetailNum"> 1 </span>
                    </li>
                </ul>
            </div>
        </div>
        <div class="play-wrap">
            <div class="play-frame-wrap" style="width: 100%;">
                <div class="play-content-text-wrapper" style="width: 84%;">
                    <div style="display: none">
                        <label class="labelName">
                            文件列表:
                        </label>
                        <select id="testFileList"></select>
                    </div>
                    <div class="jianbian_se" style="height: 38px;line-height: 38px;border-radius: 4px 4px 0px 0px;border: none;font-size: 12px;padding-left: 12px;position: relative;">
                        <span style="font-weight: bold;">投诉-办结情况</span>
                    </div>
                    <div class="play-content-text_H5" id="play-content-text" style="height: 582px; font-size: 12px;">
                        <span id="content-top"></span>
                    </div>
                </div>
            </div>
            <!-- 匹配模型 -->
            <div style="width: 15%; height: 650px; background-color: #fff; position: absolute; right: 0; top: 0;">
                <p style="padding-left: 12px; padding-top: 12px; font-weight: bold;">
                    匹配模型
                </p>
                <!-- 匹配模型搜索 -->
                <div class="search-play" style="position: relative; top: 12px; margin: auto; width: 192px; height: 28px; background: #f7f7f7; border-radius: 4px; outline: none;">
                    <input type="text" class="model-view-search-input" placeholder="搜索你要的模型" ng-model="keyword" ng-keydown="enterKey($event)" maxlength="45">
                    <input type="button" class="icon icon-search" ng-click="search()">
                </div>
                <!-- 匹配模型展示 -->
                <div style="height: 572px; border: none; font-size: 12px;position: relative; overflow-x: hidden; overflow-y: auto; top: 20px;">
                    <ul>
                        <li style="border: 1px solid rgb(240,240,240); width: 192px; height: 30px; background-color: #f2f2f2; line-height: 30px; margin: auto; padding-left: 12px; padding-right: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-top: 10px; border-radius: 4px; cursor: pointer;" title="111qwerqrqwrqerqwrqwerqwrqwrqeqwqwe">
                            111qwerqrqwrqerqwrqwerqwrqwrqeqwqwe
                        </li>
                        <li style="border: 1px solid rgb(240,240,240); width: 192px; height: 30px; background-color: #f2f2f2; line-height: 30px; margin: auto; padding-left: 12px; padding-right: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-top: 10px; border-radius: 4px; cursor: pointer;" title="111">
                            111
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script src="framework/jquery/jquery.min.js"></script>
    <script src="framework/jquery-ui/jquery-ui.min.js"></script>
    <script src="framework/placeholder/jquery.placeholder.min.js"></script>
    <script src="framework/angular/angular.js"></script>
    <script src="framework/ng-dialog/js/ngDialog.js"></script>
    <script src="framework/ng-dialog/js/ngDialog.min.js"></script>
    <script src="playtext/playtext.js"></script>
    <script src="playtext/playtextService.js"></script>
    <script src="interceptor/interceptor.js"></script>
    <script src="interceptor/repeat.submit.js"></script>
    <!-- <script type="text/javascript" src="play/labelValueDirective.js"></script> -->
    <script src="services/filterService.js"></script>
</body>
</html>
