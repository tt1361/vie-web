<div class="report-detail">
    <div class="dimension-button" ng-click="showSelectDimension()" title="{{name}}">
        <span ng-bind="name | subData: 12"></span>
        <i class="picture picture-select-down newtab" ng-class="{true: 'active'}[dialogShow]"></i>
    </div>
    <div class="showOrHide" ng-class="{true: 'active'}[dialogShow]">
        <div class="dialog-wrap">
            <div class="dialog-header">
                <div class="search-outter-wrap">
                    <div class="search-inner-wrap">
                        <input type="text" ng-model="content" placeholder="请输入模型名称">
                    </div>
                </div>
                <div class="culum-wrap culum-wrap-x2">
                    <ul>
                        <li>
                            <label>
                                <input type="checkbox" ng-checked="allChecked" ng-click="toggleAllChecked()">
                                全选
                            </label>
                        </li>
                        <li class="text-right">
                        </li>
                    </ul>
                    <div class="clear"></div>
                </div>
            </div>
            <div class="dialog-content" id="musel-style">
                <div>
                    <ul class="culum-wrap culum-wrap-x2">
                        <li class="single-line" ng-repeat="dimension in dimensions" on-finish-render="" broadcasteventname="dimensionRender">
                            <label title="{{dimension.modelGroup}}" ng-click="toggleOpened($index)">
                                <i class="normal" ng-if="!dimension.isOpen">+</i>
                                <i class="normal" ng-if="dimension.isOpen">-</i>
                                {{dimension.modelGroup}}
                            </label>
                            <label ng-if="dimension.isOpen" class="db" ng-repeat="item in dimension.value | filter:{value : content}" title="{{item.value}}">
                                <input type="checkbox" ng-model="item.isSelect" ng-checked="item.isSelect" ng-change="checkedThis(item)">
                                {{item.value}}
                            </label>
                        </li>
                    </ul>
                    <div class="clear"></div>
                </div>
            </div>
            <div class="dialog-footer">
                <button class="primary" ng-click="changeDimension()">
                    确定
                </button>
            </div>
        </div>
    </div>
</div>
