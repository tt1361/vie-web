<li class="push-model-item">
    <div class="item-wrap">
        <div class="model-name common-overflow">
            <a title="{{item.modelName}}">{{item.modelName}}</a>
        </div>
        <div class="count model-count" title="{{item.count}}">
            <span>[</span>
            <span class="common-count common-overflow">{{item.count}}</span>
            <span>]</span>
        </div>
        <i class="picture picture-condition-add model-rout-add" ng-click="pushIntoRoute()"></i>
    </div>
</li>
