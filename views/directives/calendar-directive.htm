<li class="condition-time" uid="{{uid}}" ng-style="{width:(type==='index' || !type || (type && type!='topic-right' && type !='index'))?'330px':''}">
    <label class="dimension-culum" ng-if="type!='topic'">
        <span ng-if="!type" title="起止时间">起止时间</span>
        <span ng-if="type && type!='topic-right' && type !='index'">时间:</span>
        <span ng-if="type==='topic-right'">选择时间:</span>
        <span ng-if="type==='index'">选择时间:</span>
    </label>
    <input id="chooseDate" style="width: 260px;" type="text" placeholder="选择时间" readonly ng-model="inputTime" ng-click="showOpen()" ng-disabled="status === -1 || status === 0 || status === '-1' || status === '0'">
    <div class="datarangepicker-wrap" ng-class="{'active':isOpen, 'calendar-show':isCalendarOpen}" ng-style="{width:isCalendarOpen ? '695px' : ''}">
        <div class="datarangepicker-left-tab">
            <div class="datarangepicker-left-header">
                <a class="tags-tab time" ng-click="changeTab(1)" ng-class="{'active':tab === 0}"> 自然时间 </a>
                <a class="tags-tab time" ng-click="changeTab(2)" ng-class="{'active':tab === 1}"> 相对时间 </a>
            </div>
            <ul class="relative-time-wrap" ng-show="tab === 0">
                <li class="timelim" ng-click="setReTime(-1)" ng-class="{'active':item.timeValue === -1}">
                    昨日
                </li>
                <li class="timelim" ng-click="setReTime(1)" ng-class="{'active':item.timeValue === 1}">
                    今日
                </li>
                <li class="timelim" ng-click="setReTime(-2)" ng-class="{'active':item.timeValue === -2}">
                    上周
                </li>
                <li class="timelim" ng-click="setReTime(2)" ng-class="{'active':item.timeValue === 2}">
                    本周
                </li>
                <li class="timelim" ng-click="setReTime(-3)" ng-class="{'active':item.timeValue === -3}">
                    上月
                </li>
                <li class="timelim" ng-click="setReTime(3)" ng-class="{'active':item.timeValue === 3}">
                    本月
                </li>
                <li class="timelim" ng-click="setReTime(-4)" ng-class="{'active':item.timeValue === -4}">
                    上年
                </li>
                <li class="timelim" ng-click="setReTime(4)" ng-class="{'active':item.timeValue === 4}">
                    本年
                </li>
            </ul>
            <ul class="absolute-time-wrap" ng-show="tab === 1">
                <li class="timelim" ng-click="setAbTime(7)" ng-class="{'active':item.timeValue === -7}">
                    过去 7 天
                </li>
                <li class="timelim" ng-click="setAbTime(30)" ng-class="{'active':item.timeValue === -30}">
                    过去 30 天
                </li>
                <li class="timelim" ng-click="setAbTime(90)" ng-class="{'active':item.timeValue === -90}">
                    过去 90 天
                </li>
                <li class="timelim" ng-click="setAbTime(180)" ng-class="{'active':item.timeValue === -180}">
                    过去 180 天
                </li>
                <li class="timelim" ng-click="setAbTime(365)" ng-class="{'active':item.timeValue === -365}">
                    过去 365 天
                </li>
            </ul>
            <ul class="custom-time-wrap">
                <li class="timelim" ng-click="custom()" ng-class="{'active':item.timeType === 3 && !item.timeValue && item.timeValue !=0}">
                    自定义区间
                </li>
            </ul>
            <div class="clear"></div>
        </div>
        <div class="datepicker-wrap calendar" style="position: static;" ng-class="{'active': isCalendarOpen}">
            <div class="time-range-select">
                <input type="hidden" name="startDate" class="startAdDateInput" value="{{item.defaultStart}}">
                <div class="inline-picker startDatepicker calendar"></div>
                <!-- 石勇 新增 开始时间-->
                <div style="position: absolute; bottom: 55px; left: 175px; width: 136px; height: 20px;">
                    <ul class="show-time" style="line-height: 19px;">
                        <li style="border-right: 1px solid #bababa; width: 40px; height: 19px; text-align: center;">
                            时间
                        </li>
                        <!-- 小时 -->
                        <li style="margin-left: 5px;">
                            <input style="cursor: pointer; border: 0px solid black; width: 16px; height: 16px; padding-left: 0px; text-align: center; line-height: 16px; color: #01aead; float: left; margin-top: 2px;" type="text" ng-click="DatetimeChoose(1)" ng-model="hourValue" value="00" readonly>
                            :
                        </li>
                        <!-- 分钟 -->
                        <li>
                            <input style="cursor: pointer; border: 0px solid black; width: 16px; height: 16px; padding-left: 0px; text-align: center; line-height: 16px; color: #01aead; float: left; margin-top: 2px;" type="text" ng-click="DatetimeChoose(2)" ng-model="minValue" value="00" readonly>
                            :
                        </li>
                        <!-- 秒 -->
                        <li>
                            <input style="border: 0px solid black; width: 16px; height: 16px; padding-left: 0px; text-align: center; line-height: 16px; color: #01aead; float: left; margin-top: 2px;" type="text" value="00" readonly>
                        </li>
                    </ul>
                    <div class="choose-hour" ng-class="{'choose-min':judeg}" ng-if="chooseDatetime">
                        <div class="close-datetime">
                            <span ng-click="closeChooseDatetime(event)">×</span>
                        </div>
                        <div style="width: 100%;">
                            <span class="chooseDatetimeTest" ng-if="!judeg" ng-class="{'chooseedDatetime':{{item}} == hourValue}" ng-repeat="item in datetimeTemp" ng-click="chooseResult(item)" title="{{item}}">{{item}}</span>
                            <span class="chooseDatetimeTest" ng-if="judeg" ng-class="{'chooseedDatetime':{{item}} == minValue}" ng-repeat="item in datetimeTemp" ng-click="chooseResult(item)" title="{{item}}">{{item}}</span>
                        </div>
                    </div>
                </div>
                <!--  -->
                <input type="hidden" name="endDate" class="endAdDateInput" value="{{item.defaultEnd}}">
                <div class="inline-picker endDatepicker calendar"></div>
                <!-- 石勇 新增 结束时间-->
                <div style="position: absolute; bottom: 55px; right: 135px; width: 136px; height: 20px;">
                    <ul class="show-time" style="line-height: 19px;">
                        <li style="border-right: 1px solid #bababa; width: 40px; height: 20px; text-align: center;">
                            时间
                        </li>
                        <!-- 小时 -->
                        <li style="margin-left: 5px;">
                            <input style="cursor: pointer; border: 0px solid black; width: 16px; height: 16px; padding-left: 0px; text-align: center; line-height: 16px; color: #01aead; float: left; margin-top: 2px;" type="text" ng-click="endDatetimeChoose(1)" ng-model="endHourValue" value="00" readonly>
                            :
                        </li>
                        <!-- 分钟 -->
                        <li>
                            <input style="cursor: pointer; border: 0px solid black; width: 16px; height: 16px; padding-left: 0px; text-align: center; line-height: 16px; color: #01aead; float: left; margin-top: 2px;" type="text" ng-click="endDatetimeChoose(2)" ng-model="endMinValue" value="00" readonly>
                            :
                        </li>
                        <!-- 秒 -->
                        <li>
                            <input style="border: 0px solid black; width: 16px; height: 16px; padding-left: 0px; text-align: center; line-height: 16px; color: #01aead; float: left; margin-top: 2px;" type="text" value="59" readonly>
                        </li>
                    </ul>
                    <div class="choose-hour" ng-class="{'choose-min':endJudeg}" ng-if="endChooseDatetime">
                        <div class="close-datetime">
                            <span ng-click="closeChooseEndDatetime()">×</span>
                        </div>
                        <div style="width: 100%;">
                            <span class="chooseDatetimeTest" ng-if="!endJudeg" ng-repeat="item in endDatetimeTemp" ng-class="{'chooseedDatetime':{{item}} == endHourValue}" ng-click="chooseEndResult(item)" title="{{item}}">{{item}}</span>
                            <span class="chooseDatetimeTest" ng-if="endJudeg" ng-repeat="item in endDatetimeTemp" ng-class="{'chooseedDatetime':{{item}} == endMinValue}" ng-click="chooseEndResult(item)" title="{{item}}">{{item}}</span>
                        </div>
                    </div>
                </div>
                <!--  -->
            </div>
            <div class="clear"></div>
        </div>
        <div class="time-btn-wrap calendar" ng-show="isCalendarOpen">
            <button ng-click="setDateRange()" class="btn btn-primary small">
                应&nbsp;用
            </button>
            <button ng-click="closeDialog()" class="btn btn-nomal small">
                取消
            </button>
        </div>
        <div class="clear"></div>
    </div>
</li>
