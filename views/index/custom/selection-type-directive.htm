<div class="time-select-wrapper" uid="{{uid}}">
    <span class="order-type" ng-click="showTypeOpen()">{{typeText}}</span>
    <i class="picture picture-time-select-down" ng-class="{'active':typeOpen}" ng-click="showTypeOpen()"></i>
    <div class="order-type-select type" ng-show="typeOpen">
        <i class="triangle-up-select"></i>
        <ul class="order-type-value">
            <li ng-click="selectType('43')" ng-class="{'active':type === '43'}">
                基础分析
            </li>
            <li ng-click="selectType('41')" ng-class="{'active':type === '41'}">
                聚类工具
            </li>
            <li ng-click="selectType('44')" ng-class="{'active':type === '44'}">
                热词分析
            </li>
            <li class="no-bottom" ng-click="selectType('42')" ng-class="{'active':type === '42'}">
                漏斗工具
            </li>
        </ul>
    </div>
    <div class="clear"></div>
</div>
